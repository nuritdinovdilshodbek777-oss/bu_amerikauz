<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; }
        .container {
            max-width:600px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }
        input, textarea {
            width:100%;
            padding:10px;
            margin-top:10px;
            border-radius:6px;
            border:1px solid #ccc;
        }
        button {
            margin-top:15px;
            padding:10px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📩 Contact Us</h2>

    {% if success %}
        <p style="color:green;">Xabaringiz yuborildi ✅</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Ismingiz" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Xabar..." rows="5" required></textarea>
        <button type="submit">Yuborish</button>
    </form>
</div>

</body>
</html>
